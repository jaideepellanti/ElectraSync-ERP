<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Invoice — ElectraSync ERP</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body style="background:var(--color-bg);padding:24px;">

<div class="no-print" style="max-width:600px;margin:0 auto 16px;display:flex;gap:10px;">
  <button class="btn btn-primary" onclick="window.print()">🖨️ Print Invoice</button>
  <a th:href="@{/pos}" class="btn btn-accent">+ New Sale</a>
  <a th:href="@{/dashboard}" class="btn btn-outline">← Dashboard</a>
</div>

<div class="invoice-paper">
  <div class="invoice-header">
    <div>
      <div style="font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--color-primary-dark);">
        <span style="color:var(--color-accent);">⚡</span> ElectraSync ERP
      </div>
      <div class="text-muted" style="font-size:12px;">Electronics Retail &amp; POS</div>
    </div>
    <div style="text-align:right;">
      <div style="font-size:18px;font-weight:800;color:var(--color-primary-dark);">INVOICE</div>
      <div style="font-size:13px;"><strong th:text="${sale.invoiceNumber}"></strong></div>
      <div class="text-muted" style="font-size:12px;" th:text="${#temporals.format(sale.saleDate,'dd MMM yyyy, hh:mm a')}"></div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;font-size:13px;">
    <div>
      <div style="font-weight:700;margin-bottom:4px;">Bill To</div>
      <div th:if="${sale.customer}" th:text="${sale.customer.fullName}"></div>
      <div th:if="${sale.customer}" th:text="${sale.customer.phone}"></div>
      <div th:if="${!sale.customer and sale.walkInCustomerName}" th:text="${sale.walkInCustomerName}"></div>
      <div th:if="${!sale.customer and !sale.walkInCustomerName}" class="text-muted">Walk-in Customer</div>
    </div>
    <div style="text-align:right;">
      <div style="font-weight:700;margin-bottom:4px;">Payment</div>
      <div th:text="${sale.paymentMethod}"></div>
      <div th:if="${sale.paymentReference}" class="text-muted" style="font-size:11.5px;">
        Ref: <span th:text="${sale.paymentReference}"></span>
      </div>
      <div>Cashier: <span th:text="${sale.cashier != null ? sale.cashier.fullName : '-'}"></span></div>
    </div>
  </div>

  <table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px;">
    <thead>
      <tr style="background:#f1f2f9;">
        <th style="padding:8px 10px;text-align:left;border-bottom:1px solid var(--color-border);">Product</th>
        <th style="padding:8px 10px;text-align:center;border-bottom:1px solid var(--color-border);">Qty</th>
        <th style="padding:8px 10px;text-align:right;border-bottom:1px solid var(--color-border);">Unit Price</th>
        <th style="padding:8px 10px;text-align:right;border-bottom:1px solid var(--color-border);">Total</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="item : ${sale.saleItems}">
        <td style="padding:8px 10px;border-bottom:1px solid var(--color-border);">
          <div th:text="${item.product.name}"></div>
          <div th:if="${!#lists.isEmpty(item.product.specifications)}"
               style="font-size:11px; color:var(--color-primary); margin-top:2px;"
               th:text="${item.product.specificationSummary}"></div>
        </td>
        <td style="padding:8px 10px;text-align:center;border-bottom:1px solid var(--color-border);" th:text="${item.quantity}"></td>
        <td style="padding:8px 10px;text-align:right;border-bottom:1px solid var(--color-border);">₹<span th:text="${#numbers.formatDecimal(item.unitPrice,0,'COMMA',2,'POINT')}"></span></td>
        <td style="padding:8px 10px;text-align:right;border-bottom:1px solid var(--color-border);">₹<span th:text="${#numbers.formatDecimal(item.lineTotal,0,'COMMA',2,'POINT')}"></span></td>
      </tr>
    </tbody>
  </table>

  <div style="display:flex;justify-content:flex-end;">
    <div style="min-width:220px;font-size:13.5px;">
      <div style="display:flex;justify-content:space-between;padding:5px 0;"><span>Subtotal</span><span>₹<span th:text="${#numbers.formatDecimal(sale.subTotal,0,'COMMA',2,'POINT')}"></span></span></div>
      <div style="display:flex;justify-content:space-between;padding:5px 0;" th:if="${sale.discountPercent > 0}">
        <span>Discount (<span th:text="${sale.discountPercent}"></span>%)</span>
        <span style="color:var(--color-success);">- ₹<span th:text="${#numbers.formatDecimal(sale.discountAmount,0,'COMMA',2,'POINT')}"></span></span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-top:2px solid var(--color-primary-dark);margin-top:4px;font-size:17px;font-weight:800;color:var(--color-primary-dark);">
        <span>TOTAL</span><span>₹<span th:text="${#numbers.formatDecimal(sale.totalAmount,0,'COMMA',2,'POINT')}"></span></span>
      </div>
    </div>
  </div>

  <div style="margin-top:24px;border-top:1px dashed var(--color-border);padding-top:14px;text-align:center;font-size:12px;color:var(--color-ink-soft);">
    Thank you for shopping at ElectraSync! &nbsp;|&nbsp; Goods once sold cannot be returned without invoice.
  </div>
</div>
</body>
</html>
