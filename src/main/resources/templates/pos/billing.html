<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>POS Billing — ElectraSync ERP</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { overflow: hidden; }
        .pos-topbar {
            background: var(--color-primary-dark);
            color: #fff;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .pos-topbar .brand { font-family: var(--font-display); font-weight: 800; font-size: 16px; }
        .pos-topbar .bolt { color: var(--color-accent); }
        .pos-body { display: grid; grid-template-columns: 1fr 400px; height: calc(100vh - 44px); }

        /* Product grid panel */
        .products-panel { padding: 16px; overflow-y: auto; background: var(--color-bg); }

        /* Guided filters: Category -> Brand -> Search */
        .filter-bar { display: flex; gap: 10px; margin-bottom: 14px; }
        .filter-bar select, .filter-bar input {
            padding: 9px 12px;
            border: 1.5px solid var(--color-border);
            border-radius: var(--radius-md);
            font-size: 13.5px;
            font-family: var(--font-body);
            background: #fff;
        }
        .filter-bar select { flex: 1; }
        .filter-bar input { flex: 1.5; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; }
        .product-tile {
            background: #fff; border: 1.5px solid var(--color-border);
            border-radius: var(--radius-md); padding: 12px; cursor: pointer;
            transition: all 0.12s;
        }
        .product-tile:hover { border-color: var(--color-primary); box-shadow: var(--shadow-md); }
        .product-tile .p-sku { font-size: 10.5px; color: var(--color-ink-soft); }
        .product-tile .p-name { font-weight: 600; font-size: 12.5px; margin: 3px 0; }
        .product-tile .p-specs {
            font-size: 10.5px; color: var(--color-primary); margin-bottom: 4px;
            line-height: 1.4;
        }
        .product-tile .p-price { color: var(--color-primary); font-weight: 700; font-size: 14px; }
        .product-tile .p-stock { font-size: 11px; color: var(--color-ink-soft); margin-top: 3px; }
        .product-tile.out-of-stock { opacity: 0.4; cursor: not-allowed; }
        .no-results { grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--color-ink-soft); font-size: 13px; }

        /* Cart panel */
        .cart-panel {
            background: #fff; border-left: 1px solid var(--color-border);
            display: flex; flex-direction: column;
        }
        .cart-header { padding: 14px 16px; border-bottom: 1px solid var(--color-border); font-weight: 700; font-size: 15px; }
        .cart-body { flex: 1; overflow-y: auto; padding: 8px 16px; }
        .cart-empty { text-align: center; color: var(--color-ink-soft); padding: 40px 0; font-size: 13px; }
        .cart-item {
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 8px 0; border-bottom: 1px solid var(--color-border); font-size: 13px;
        }
        .cart-item .item-name { font-weight: 600; margin-bottom: 2px; font-size: 12.5px; }
        .cart-item .item-specs { font-size: 10.5px; color: var(--color-primary); margin-bottom: 2px; }
        .qty-controls { display: flex; align-items: center; gap: 8px; }
        .qty-btn {
            width: 26px; height: 26px; border: 1px solid var(--color-border);
            border-radius: 4px; background: #fff; cursor: pointer; font-size: 16px;
            display: flex; align-items: center; justify-content: center; font-weight: 700;
        }
        .qty-btn:hover { background: var(--color-bg); }

        /* Cart footer */
        .cart-footer { padding: 14px 16px; border-top: 2px solid var(--color-border); }
        .total-row { display: flex; justify-content: space-between; font-size: 13.5px; margin-bottom: 6px; }
        .grand-total { font-size: 20px; font-weight: 800; color: var(--color-primary-dark); }
        .customer-input {
            width: 100%; padding: 8px 10px;
            border: 1px solid var(--color-border); border-radius: 6px;
            font-size: 13px; margin-bottom: 8px; font-family: var(--font-body);
        }
    </style>
</head>
<body>

<!-- Top bar -->
<div class="pos-topbar">
    <div class="brand"><span class="bolt">⚡</span> ElectraSync — POS Billing</div>
    <div style="display:flex; gap:16px; align-items:center; font-size:13px;">
        <a th:href="@{/dashboard}" style="color:rgba(255,255,255,0.75);">← Dashboard</a>
        <a th:href="@{/sales}" style="color:rgba(255,255,255,0.75);">Sales History</a>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button style="background:none; border:none; color:rgba(255,255,255,0.75); cursor:pointer; font-size:13px;">Sign out</button>
        </form>
    </div>
</div>

<div class="pos-body">

    <!-- Left: Products Panel -->
    <div class="products-panel">

        <!-- Error from failed checkout -->
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}" style="margin-bottom:12px;"></div>

        <!-- Guided filters: Category -> Brand -> Search text -->
        <div class="filter-bar">
            <select id="category-filter">
                <option value="">All Categories</option>
                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
            </select>
            <select id="brand-filter">
                <option value="">All Brands</option>
                <option th:each="b : ${brands}" th:value="${b.id}" th:text="${b.name}"></option>
            </select>
            <input type="text" id="search-input" placeholder="🔍 Search by name or SKU…">
        </div>

        <!-- Product tiles -->
        <div class="product-grid" id="product-grid">
            <div th:each="p : ${products}"
                 class="product-tile"
                 th:classappend="${p.stockQuantity <= 0} ? ' out-of-stock' : ''"
                 th:id="'tile-' + ${p.id}"
                 th:data-name="${#strings.toLowerCase(p.name)}"
                 th:data-sku="${#strings.toLowerCase(p.sku)}"
                 th:data-category-id="${p.category.id}"
                 th:data-brand-id="${p.brand.id}"
                 th:data-id="${p.id}"
                 th:data-product-name="${p.name}"
                 th:data-specs="${p.specificationSummary}"
                 th:data-price="${p.sellingPrice}"
                 th:data-stock="${p.stockQuantity}">
                <div class="p-sku" th:text="${p.sku}"></div>
                <div class="p-name" th:text="${p.name}"></div>
                <div th:if="${!#lists.isEmpty(p.specifications)}" class="p-specs" th:text="${p.specificationSummary}"></div>
                <div class="p-price">₹<span th:text="${#numbers.formatDecimal(p.sellingPrice, 0, 'COMMA', 2, 'POINT')}"></span></div>
                <div class="p-stock" th:text="${p.stockQuantity > 0} ? 'Stock: ' + ${p.stockQuantity} : 'Out of Stock'"></div>
            </div>
            <div class="no-results" id="no-results" style="display:none;">No products match your filters.</div>
        </div>

    </div>

    <!-- Right: Cart Panel -->
    <div class="cart-panel">

        <div class="cart-header">🛒 Bill Summary</div>

        <div class="cart-body" id="cart-body">
            <div class="cart-empty" id="cart-empty">
                No items added yet.<br>Select a category, brand, then click a product to add it.
            </div>
        </div>

        <div class="cart-footer">

            <!-- Totals -->
            <div class="total-row"><span>Subtotal</span><span id="subtotal-display">₹0.00</span></div>
            <div class="total-row">
                <span>Discount %</span>
                <input type="number" id="discount-input" value="0" min="0" max="100" step="0.5"
                       style="width:60px; padding:3px 6px; border:1px solid var(--color-border); border-radius:4px; text-align:right;"
                       oninput="recalcTotals()">
            </div>
            <div class="total-row"><span>Discount Amt</span><span id="discount-display">₹0.00</span></div>
            <div class="total-row grand-total"><span>TOTAL</span><span id="grand-total-display">₹0.00</span></div>

            <!-- Checkout Form -->
            <form id="checkout-form" th:action="@{/pos/checkout}" method="post">

                <!-- Hidden fields for cart items - populated by JavaScript before submit -->
                <div id="form-items"></div>
                <input type="hidden" name="discountPercent" id="discount-hidden" value="0">
                <input type="hidden" name="customerId" id="customerId">

                <!-- Customer lookup by phone -->
                <input type="text" id="customer-phone" class="customer-input"
                       placeholder="📞 Customer phone (optional)"
                       oninput="lookupCustomer(this.value)">
                <div id="customer-hint" style="font-size:11.5px; color:var(--color-success); margin-bottom:6px; min-height:16px;"></div>

                <!-- Walk-in customer name (if not registered) -->
                <input type="text" name="walkInCustomerName" class="customer-input"
                       placeholder="Walk-in customer name (optional)">

                <!-- Payment method -->
                <select name="paymentMethod" id="payment-method" class="customer-input" required onchange="togglePaymentReference()">
                    <option value="CASH">💵 Cash</option>
                    <option value="UPI">📱 UPI</option>
                    <option value="CARD">💳 Card</option>
                    <option value="EMI">🔄 EMI</option>
                    <option value="NET_BANKING">🌐 Net Banking</option>
                </select>

                <!-- Transaction reference - shown only for digital payments -->
                <input type="text" name="paymentReference" id="payment-reference" class="customer-input"
                       placeholder="Transaction / Reference ID" style="display:none;">

                <button type="button" class="btn btn-accent"
                        style="width:100%; justify-content:center; font-size:15px; padding:13px; margin-top:8px;"
                        onclick="submitCheckout()">
                    ✅ Generate Invoice
                </button>

            </form>
        </div>
    </div>

</div>

<script>
    // Cart state: array of { id, name, specs, price, qty, maxStock }
    var cart = [];

    // ---------- Guided filtering: Category -> Brand -> Search text ----------
    var categoryFilter = document.getElementById('category-filter');
    var brandFilter = document.getElementById('brand-filter');
    var searchInput = document.getElementById('search-input');

    categoryFilter.addEventListener('change', applyFilters);
    brandFilter.addEventListener('change', applyFilters);
    searchInput.addEventListener('input', applyFilters);

    function applyFilters() {
        var categoryId = categoryFilter.value;
        var brandId = brandFilter.value;
        var searchText = searchInput.value.toLowerCase().trim();
        var visibleCount = 0;

        document.querySelectorAll('.product-tile').forEach(function (tile) {
            var matchesCategory = !categoryId || tile.dataset.categoryId === categoryId;
            var matchesBrand = !brandId || tile.dataset.brandId === brandId;
            var matchesSearch = !searchText
                || tile.dataset.name.includes(searchText)
                || tile.dataset.sku.includes(searchText);

            var isVisible = matchesCategory && matchesBrand && matchesSearch;
            tile.style.display = isVisible ? '' : 'none';
            if (isVisible) visibleCount++;
        });

        document.getElementById('no-results').style.display = visibleCount === 0 ? 'block' : 'none';
    }

    // ---------- Add to cart ----------
    // Attach click handlers to all product tiles using event delegation.
    document.getElementById('product-grid').addEventListener('click', function(e) {
        var tile = e.target.closest('.product-tile');
        if (!tile) return;

        var stock = parseInt(tile.dataset.stock, 10);
        if (stock <= 0) {
            alert('This product is out of stock.');
            return;
        }

        var id = parseInt(tile.dataset.id, 10);
        var name = tile.dataset.productName;
        var specs = tile.dataset.specs || '';
        var price = parseFloat(tile.dataset.price);
        addToCart(id, name, specs, price, stock);
    });

    function addToCart(id, name, specs, price, maxStock) {
        var existing = cart.find(function(item) { return item.id === id; });
        if (existing) {
            if (existing.qty < maxStock) {
                existing.qty++;
            } else {
                alert('Only ' + maxStock + ' units available in stock.');
                return;
            }
        } else {
            cart.push({ id: id, name: name, specs: specs, price: price, qty: 1, maxStock: maxStock });
        }
        renderCart();
    }

    function changeQty(id, delta) {
        var item = cart.find(function(i) { return i.id === id; });
        if (!item) return;
        item.qty += delta;
        if (item.qty <= 0) {
            cart = cart.filter(function(i) { return i.id !== id; });
        } else if (item.qty > item.maxStock) {
            item.qty = item.maxStock;
            alert('Stock limit reached.');
        }
        renderCart();
    }

    function renderCart() {
        var body = document.getElementById('cart-body');
        document.getElementById('cart-empty').style.display = cart.length === 0 ? 'block' : 'none';

        var existing = body.querySelectorAll('.cart-item');
        existing.forEach(function(el) { el.remove(); });

        cart.forEach(function(item) {
            var div = document.createElement('div');
            div.className = 'cart-item';
            var specsHtml = item.specs ? '<div class="item-specs">' + escapeHtml(item.specs) + '</div>' : '';
            div.innerHTML =
                '<div>' +
                    '<div class="item-name">' + escapeHtml(item.name) + '</div>' +
                    specsHtml +
                    '<div style="color:var(--color-ink-soft); font-size:11.5px;">₹' + fmt(item.price) + ' × ' + item.qty + '</div>' +
                '</div>' +
                '<div style="display:flex; align-items:center; gap:10px;">' +
                    '<div class="qty-controls">' +
                        '<button class="qty-btn" type="button" onclick="changeQty(' + item.id + ', -1)">−</button>' +
                        '<span style="font-weight:700; min-width:20px; text-align:center;">' + item.qty + '</span>' +
                        '<button class="qty-btn" type="button" onclick="changeQty(' + item.id + ', 1)">+</button>' +
                    '</div>' +
                    '<span style="font-weight:700; min-width:75px; text-align:right;">₹' + fmt(item.price * item.qty) + '</span>' +
                '</div>';
            body.insertBefore(div, document.getElementById('cart-empty'));
        });

        recalcTotals();
    }

    function recalcTotals() {
        var subTotal = cart.reduce(function(sum, item) { return sum + item.price * item.qty; }, 0);
        var discPct = parseFloat(document.getElementById('discount-input').value) || 0;
        var discAmt = subTotal * discPct / 100;
        var grandTotal = subTotal - discAmt;

        document.getElementById('subtotal-display').textContent = '₹' + fmt(subTotal);
        document.getElementById('discount-display').textContent = '₹' + fmt(discAmt);
        document.getElementById('grand-total-display').textContent = '₹' + fmt(grandTotal);
        document.getElementById('discount-hidden').value = discPct;
    }

    // Show the transaction reference field only for digital payment methods
    function togglePaymentReference() {
        var method = document.getElementById('payment-method').value;
        var refField = document.getElementById('payment-reference');
        var isDigital = method === 'UPI' || method === 'CARD' || method === 'NET_BANKING';
        refField.style.display = isDigital ? 'block' : 'none';
        refField.required = isDigital;
        if (!isDigital) refField.value = '';
    }

    // Look up customer by phone number when cashier types in the phone field
    var lookupTimer = null;
    function lookupCustomer(phone) {
        document.getElementById('customerId').value = '';
        document.getElementById('customer-hint').textContent = '';
        clearTimeout(lookupTimer);
        if (phone.length < 10) return;

        lookupTimer = setTimeout(function() {
            fetch('/pos/customer-search?phone=' + encodeURIComponent(phone))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data && data.id) {
                        document.getElementById('customerId').value = data.id;
                        document.getElementById('customer-hint').textContent = '✓ Found: ' + data.fullName;
                    } else {
                        document.getElementById('customer-hint').textContent = 'No registered customer found — use walk-in name below.';
                        document.getElementById('customer-hint').style.color = 'var(--color-ink-soft)';
                    }
                })
                .catch(function() {});
        }, 400);
    }

    // Validate cart and populate hidden form fields before submitting
    function submitCheckout() {
        if (cart.length === 0) {
            alert('Please add at least one product to the cart before generating an invoice.');
            return;
        }

        var method = document.getElementById('payment-method').value;
        var isDigital = method === 'UPI' || method === 'CARD' || method === 'NET_BANKING';
        var reference = document.getElementById('payment-reference').value.trim();
        if (isDigital && !reference) {
            alert('Please enter a transaction/reference number for ' + method + ' payments.');
            return;
        }

        var container = document.getElementById('form-items');
        container.innerHTML = '';
        cart.forEach(function(item) {
            container.innerHTML +=
                '<input type="hidden" name="productIds" value="' + item.id + '">' +
                '<input type="hidden" name="quantities" value="' + item.qty + '">';
        });

        document.getElementById('checkout-form').submit();
    }

    function fmt(n) {
        return parseFloat(n).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
</script>

</body>
</html>
