<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customer Form — ElectraSync ERP</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{partials/sidebar :: sidebar}"></div>
    <div class="main-content">

        <div class="page-header">
            <div>
                <h1 th:text="${customer.id == null} ? 'Add New Customer' : 'Edit Customer'"></h1>
            </div>
            <a th:href="@{/manager/customers}" class="btn btn-outline">← Back to Customers</a>
        </div>

        <div th:replace="~{partials/flash-messages :: flashMessages}"></div>

        <div class="card" style="max-width:600px;">
            <form th:action="@{/manager/customers/save}" method="post" th:object="${customer}">
                <input type="hidden" th:field="*{id}">

                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" class="form-control" th:field="*{fullName}"
                               required placeholder="e.g. Priya Sharma" maxlength="100">
                    </div>
                    <div class="form-group">
                        <label>Phone Number *</label>
                        <input type="tel" class="form-control" th:field="*{phone}"
                               required placeholder="e.g. 9876543210" maxlength="15"
                               pattern="[0-9]{10,15}" title="Enter a valid 10-digit phone number">
                        <div class="field-hint">Used to look up customer at POS.</div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" th:field="*{email}"
                           placeholder="e.g. priya@email.com" maxlength="100">
                </div>

                <div class="form-group">
                    <label>Address</label>
                    <input type="text" class="form-control" th:field="*{address}"
                           placeholder="Home or office address" maxlength="255">
                </div>

                <div style="display:flex; gap:10px; margin-top:8px;">
                    <button type="submit" class="btn btn-primary">
                        <span th:text="${customer.id == null} ? 'Add Customer' : 'Save Changes'"></span>
                    </button>
                    <a th:href="@{/manager/customers}" class="btn btn-outline">Cancel</a>
                </div>
            </form>
        </div>

    </div>
</div>
</body>
</html>
