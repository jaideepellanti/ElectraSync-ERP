<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Brands — ElectraSync ERP</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{partials/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{partials/flash-messages :: flashMessages}"></div>

        <div class="page-header">
            <div>
                <h1>🏭 Brands</h1>
                <div class="subtitle">Manage product brands (e.g. Samsung, Sony, LG)</div>
            </div>
            <a th:href="@{/manager/products}" class="btn btn-outline">← Products</a>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1.8fr; gap:20px;">

            <!-- Add / Edit Brand Form -->
            <div class="card">
                <h3 style="margin-top:0;" th:text="${brand.id == null} ? 'Add New Brand' : 'Edit Brand'"></h3>
                <form th:action="@{/manager/products/brands/save}" method="post" th:object="${brand}">
                    <input type="hidden" th:field="*{id}">
                    <div class="form-group">
                        <label>Brand Name *</label>
                        <input type="text" class="form-control" th:field="*{name}"
                               required placeholder="e.g. Samsung" maxlength="100">
                    </div>
                    <div class="form-group">
                        <label>Country of Origin</label>
                        <input type="text" class="form-control" th:field="*{country}"
                               placeholder="e.g. South Korea" maxlength="100">
                    </div>
                    <button class="btn btn-primary" type="submit"
                            th:text="${brand.id == null} ? 'Add Brand' : 'Update Brand'"></button>
                    <a th:if="${brand.id != null}" th:href="@{/manager/products/brands}" class="btn btn-outline">Cancel</a>
                </form>
            </div>

            <!-- Brands List -->
            <div class="card">
                <h3 style="margin-top:0;">All Brands (<span th:text="${#lists.size(brands)}">0</span>)</h3>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Brand Name</th>
                            <th>Country</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="b, stat : ${brands}">
                            <td th:text="${stat.count}"></td>
                            <td><strong th:text="${b.name}"></strong></td>
                            <td th:text="${b.country != null} ? ${b.country} : '—'"></td>
                            <td>
                                <a th:href="@{/manager/products/brands/edit/{id}(id=${b.id})}" class="btn btn-outline btn-sm">Edit</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(brands)}">
                            <td colspan="4">
                                <div class="empty-state">
                                    <span class="empty-icon">🏭</span>
                                    No brands yet. Add one using the form.
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>
</body>
</html>
