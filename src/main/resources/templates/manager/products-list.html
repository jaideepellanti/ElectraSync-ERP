<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Products — ElectraSync ERP</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{partials/sidebar :: sidebar}"></div>
    <div class="main-content">

        <div class="page-header">
            <div>
                <h1>📦 Products</h1>
                <div class="subtitle">Manage your electronics inventory</div>
            </div>
            <div style="display:flex; gap:10px;">
                <a th:href="@{/manager/products/categories}" class="btn btn-outline">🏷️ Categories</a>
                <a th:href="@{/manager/products/brands}" class="btn btn-outline">🏭 Brands</a>
                <a th:href="@{/manager/products/new}" class="btn btn-primary">+ Add Product</a>
            </div>
        </div>

        <div th:replace="~{partials/flash-messages :: flashMessages}"></div>

        <div class="card">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>SKU</th>
                        <th>Product Name</th>
                        <th>Category</th>
                        <th>Brand</th>
                        <th>Cost Price</th>
                        <th>Sell Price</th>
                        <th>Stock</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${products}">
                        <td><code th:text="${p.sku}"></code></td>
                        <td>
                            <div th:text="${p.name}"></div>
                            <div th:if="${!#lists.isEmpty(p.specifications)}"
                                 style="font-size:11.5px; color:var(--color-ink-soft); margin-top:2px;"
                                 th:text="${p.specificationSummary}"></div>
                        </td>
                        <td th:text="${p.category.name}"></td>
                        <td th:text="${p.brand.name}"></td>
                        <td>₹<span th:text="${#numbers.formatDecimal(p.costPrice, 0, 'COMMA', 2, 'POINT')}"></span></td>
                        <td>₹<span th:text="${#numbers.formatDecimal(p.sellingPrice, 0, 'COMMA', 2, 'POINT')}"></span></td>
                        <td>
                            <span th:class="${p.lowStock} ? 'badge badge-danger' : 'badge badge-success'"
                                  th:text="${p.stockQuantity}"></span>
                        </td>
                        <td>
                            <span th:class="${p.active} ? 'badge badge-success' : 'badge badge-neutral'"
                                  th:text="${p.active} ? 'Active' : 'Inactive'"></span>
                        </td>
                        <td>
                            <div class="action-btns">
                                <a th:href="@{/manager/products/edit/{id}(id=${p.id})}" class="btn btn-outline btn-sm">Edit</a>
                                <form th:if="${p.active}" th:action="@{/manager/products/deactivate/{id}(id=${p.id})}" method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-danger btn-sm"
                                            onclick="return confirm('Deactivate this product? It will no longer appear in POS.')">
                                        Deactivate
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(products)}">
                        <td colspan="9">
                            <div class="empty-state">
                                <span class="empty-icon">📦</span>
                                No products added yet. <a th:href="@{/manager/products/new}">Add your first product</a>.
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>
</body>
</html>
