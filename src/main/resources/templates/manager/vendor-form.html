<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Vendor Form — ElectraSync ERP</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{partials/sidebar :: sidebar}"></div>
    <div class="main-content">

        <div class="page-header">
            <div>
                <h1 th:text="${vendor.id == null} ? 'Add New Vendor' : 'Edit Vendor'"></h1>
            </div>
            <a th:href="@{/manager/vendors}" class="btn btn-outline">← Back to Vendors</a>
        </div>

        <div th:replace="~{partials/flash-messages :: flashMessages}"></div>

        <div class="card" style="max-width:680px;">
            <form th:action="@{/manager/vendors/save}" method="post" th:object="${vendor}">
                <input type="hidden" th:field="*{id}">

                <div class="form-row">
                    <div class="form-group">
                        <label>Company Name *</label>
                        <input type="text" class="form-control" th:field="*{companyName}"
                               required placeholder="e.g. Samsung India Pvt Ltd" maxlength="150">
                    </div>
                    <div class="form-group">
                        <label>Contact Person *</label>
                        <input type="text" class="form-control" th:field="*{contactPerson}"
                               required placeholder="e.g. Rajesh Kumar" maxlength="100">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Phone Number *</label>
                        <input type="tel" class="form-control" th:field="*{phone}"
                               required placeholder="e.g. 9876543210" maxlength="15"
                               pattern="[0-9]{10,15}" title="Enter a valid phone number (10-15 digits)">
                        <div class="field-hint">Must be unique. No two vendors can share the same number.</div>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" class="form-control" th:field="*{email}"
                               placeholder="e.g. sales@samsung.in" maxlength="100">
                    </div>
                </div>

                <div class="form-group">
                    <label>Address</label>
                    <input type="text" class="form-control" th:field="*{address}"
                           placeholder="Street address" maxlength="255">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" class="form-control" th:field="*{city}"
                               placeholder="e.g. Hyderabad" maxlength="50">
                    </div>
                    <div class="form-group">
                        <label>State</label>
                        <input type="text" class="form-control" th:field="*{state}"
                               placeholder="e.g. Telangana" maxlength="50">
                    </div>
                </div>

                <div style="display:flex; gap:10px; margin-top:8px;">
                    <button type="submit" class="btn btn-primary">
                        <span th:text="${vendor.id == null} ? 'Add Vendor' : 'Save Changes'"></span>
                    </button>
                    <a th:href="@{/manager/vendors}" class="btn btn-outline">Cancel</a>
                </div>
            </form>
        </div>

    </div>
</div>
</body>
</html>
